<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Import result — {{ site }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
  <h1>Import result for {{ site }}</h1>
  <p>Inserted: {{ result.inserted }}</p>
  <p>Updated: {{ result.updated }}</p>
  <p>Skipped: {{ result.skipped }}</p>
  {% if result.errors %}
  <h3>Errors</h3>
  <ul>{% for e in result.errors %}<li>{{ e }}</li>{% endfor %}</ul>
  {% endif %}
  <a href="{{ url_for('graph.view', site=site) }}" class="btn btn-secondary">Back to graph</a>
</body>
</html>
