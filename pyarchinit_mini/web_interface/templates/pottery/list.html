{% extends "base.html" %}
{% block title %}Pottery{% endblock %}
{% block content %}
<div class="container mt-3">
  <h1>Pottery <small class="text-muted">({{ total }})</small></h1>
  <p class="text-muted">Full list UI lands in Task 10.</p>
  <ul>
    {% for p in items %}
    <li>#{{ p.id_rep }} — {{ p.sito }} — {{ p.form or '' }}</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
