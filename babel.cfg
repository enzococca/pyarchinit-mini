# Babel extraction configuration for PyArchInit-Mini
# Configures how Babel extracts translatable strings from source files.
# NOTE: paths are relative to the repo root, so they must be prefixed with
# pyarchinit_mini/ (the jinja2 templates path was previously wrong, so template
# strings like the sidebar/dashboard labels were never extracted).

[python: pyarchinit_mini/**.py]
encoding = utf-8

[jinja2: pyarchinit_mini/web_interface/templates/**.html]
encoding = utf-8
